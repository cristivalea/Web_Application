<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Statistics</title>
    <link rel="stylesheet" href="../style/style.css">
    <style>
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
            border-top: 6px solid #5365A8;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .obj-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .obj-number {
            font-size: 1.4em;
            font-weight: bold;
            color: #4A59AA;
        }

        .group-badge {
            background: #E18741;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85em;
            text-transform: uppercase;
        }

        .data-row {
            display: flex;
            justify-content: space-between;
            margin: 10px 0;
            font-size: 1.1em;
        }

        .status-box {
            margin-top: 15px;
            padding: 10px;
            background: #f0f2f8;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            color: #5365A8;
        }

        .highlight-score { color: #2ecc71; font-weight: bold; }
        .highlight-time { color: #e67e22; font-weight: bold; }
    </style>
</head>
<body>
    <div class="header">
        <img src="../images/itLabs.png" alt="ITLabs Logo" width="279" height="110">
        <img src="../images/upt.png" alt="University Logo" width="257" height="88">
        <img src="../images/ac.png" alt="Faculty Logo" width="296" height="90">
    </div>

    <div class="container" style="width: 92%; max-width: 1200px; margin: 40px auto; background: #E18741; padding: 40px; border-radius: 20px; box-shadow: 0 8px 20px #5365A8; box-sizing: border-box;">
        
        <h1 style="text-align: center; color: white; margin-bottom: 10px;">Performance Statistics by Objectives</h1>
        <p style="text-align: center; color: rgba(255,255,255,0.9); margin-bottom: 30px;">Analysis of average results for the current user</p>

        <div id="general-stats-container" style="margin-bottom: 30px; display: none;">
            </div>

        <h2 style="color: white; text-align: center; font-size: 1.5em; margin-top: 40px;">Detailed Performance by Objectives</h2>

        <div id="stats-container" class="stats-grid">
            <p style="color: white; text-align: center; grid-column: 1/-1;">Loading data...</p>
        </div>
    </div>

    <div class="footer">
        <p>&copy; 2025 ITLabs. All rights reserved.</p>
        <a href="../feedback.html" class="feedback">Feedback</a>
        <a href="../contact.html" class="contact">Contact Information</a>
    </div>

    <script>
      async function loadStatistics() {
            const userId = localStorage.getItem("userId");
            const container = document.getElementById("stats-container");
            const generalContainer = document.getElementById("general-stats-container");

            try {
                const [resObjectives, resGeneral] = await Promise.all([
                    fetch(`http://localhost:3001/api/user-stats/${userId}`),
                    fetch(`http://localhost:3001/api/general-stats/${userId}`) 
                ]);

                if (resGeneral.ok) {
                    const generalData = await resGeneral.json();
                    generalContainer.style.display = "block";
                    generalContainer.innerHTML = `
                        <div style="background: white; padding: 25px; border-radius: 20px; border-left: 10px solid #4A59AA; box-shadow: 0 4px 15px rgba(0,0,0,0.3); max-width: 600px; margin: 0 auto;">
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <h2 style="margin: 0; color: #4A59AA;">Statut Global: <span style="color: #E18741;">${generalData.grup}</span></h2>
                                <span style="font-size: 0.9em; color: #666;">ID: ${userId}</span>
                            </div>
                            <hr style="margin: 15px 0; border: 0; border-top: 1px solid #eee;">
                            <div style="display: flex; justify-content: space-around; text-align: center;">
                                <div>
                                    <div style="font-size: 1.8em; font-weight: bold; color: #2ecc71;">${generalData.mediePunctaj.toFixed(2)}%</div>
                                    <div style="font-size: 0.8em; color: #888;">SCOR MEDIU</div>
                                </div>
                                <div>
                                    <div style="font-size: 1.8em; font-weight: bold; color: #e67e22;">${generalData.medieTimp.toFixed(1)}s</div>
                                    <div style="font-size: 0.8em; color: #888;">TIMP MEDIU</div>
                                </div>
                            </div>
                            <div class="status-box" style="margin-top: 20px; background: #5365A8; color: white;">
                                🎯 ${generalData.statusDificultate}
                            </div>
                        </div>
                    `;
                }

             
                if (!resObjectives.ok) throw new Error("I couldn't take over the objectives.");
                const statsData = await resObjectives.json();
                
                container.innerHTML = "";
                statsData.forEach(item => {
                    const card = `
                        <div class="stat-card">
                            <div class="obj-header">
                                <span class="obj-number">Objective ${item.obiectiv}</span>
                                <span class="group-badge">${item.grup}</span>
                            </div>
                            <div class="data-row">
                                <span>🎯 Average Score:</span>
                                <span class="highlight-score">${item.mediePunctaj.toFixed(2)}%</span>
                            </div>
                            <div class="data-row">
                                <span>⏱️ Average Time:</span>
                                <span class="highlight-time">${item.medieTimp.toFixed(1)}s</span>
                            </div>
                            <div class="status-box">
                                📊 ${item.statusDificultate}
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });

            } catch (error) {
                console.error("Error", error);
                container.innerHTML = `<p style="color: white; text-align: center; grid-column: 1/-1;">Error loading data. Check your connection to the servers.</p>`;
            }
        }
        window.addEventListener("DOMContentLoaded", loadStatistics);
    </script>
</body>
</html>
