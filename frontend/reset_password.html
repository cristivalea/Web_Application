<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <link rel="stylesheet" href="../frontend/style/style.css">
</head>
<body>
   <div class="header">
        <img src="../frontend/images/itLabs.png" alt="ITLabs Logo" width="279" height="110">
        <img src="../frontend/images/upt.png" alt="University Logo" width="257" height="88">
        <img src="../frontend/images/ac.png" alt="Faculty Logo" width="296" height="90">
    </div>

    <div class="reset-container">
        <h1 class="title">Reset Password</h1>
        <form id="resetPasswordForm">
            <div class="reset-form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="reset-form-group">
                <label for="phoneNumber">Phone Number</label>
                <div class="with-button-reset">
                    <input type="tel" id="phoneNumber" name="phoneNumber" required>
                </div>
                <div class="error-message" id="phoneError">The phone number is necessary!</div>
            </div>

            <div class="button-group">
                <button type="submit" class="login-btn">Trimite Codul</button>
            </div>
        </form>
    </div>
   
    <div class="footer">
        <p>&copy; 2025 ITLabs. All rights reserved.</p>
    </div>

   <script>
document.getElementById("resetPasswordForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const phoneNumber = document.getElementById("phoneNumber").value.trim();
    const email = document.getElementById("email").value.trim();

    const dataToSend = { email, phoneNumber };

    try {
        const response = await fetch("http://localhost:3001/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(dataToSend)
        });

        const data = await response.json();

        if (response.ok) {
            alert("Codul de resetare a fost trimis pe email!");
            localStorage.setItem("resetUserId", data.userId);
            localStorage.setItem("resetPhone", data.phoneNumber);
            window.location.href = "validation_reset.html"; 
        } else {
            alert(data.message);
        }
    } catch (err) {
        console.error("Eroare:", err);
        alert("Eroare la resetarea parolei!");
    }
});
</script>



</body>
</html>
