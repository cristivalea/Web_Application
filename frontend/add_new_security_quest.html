<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Email</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <div class="header">
        <img src="../images/itLabs.png" alt="ITLabs Logo" width="279" height="110">
        <img src="../images/upt.png" alt="University Logo" width="257" height="88">
        <img src="../images/ac.png" alt="Faculty Logo" width="296" height="90">
    </div>

    <div class="add-secQuest-container">
        <h1 class="title">Add New Security Question</h1>

        <form id="addNewSecurityQuestionForm">
            <div class="auth-form-group">
                <label for="secQuest">Security Question:</label>
                <input type="text" id="secQuest" name="secQuest" required>
            </div>

            <div class="auth-form-group">
                <label for="response">Response:</label>
                <input type="text" id="response" name="response" required>
            </div>

            <button type="submit" class="add-secQuest-btn">Add New Security Question</button>
        </form>
    </div>

    <div class="footer">
        <p>&copy; 2025 ITLabs. All rights reserved.</p>
        <a href="../feedback.html" class="feedback">Feedback</a>
        <a href="../contact.html" class="contact">Contact Information</a>
    </div>

    <script>
        document.getElementById("addNewSecurityQuestionForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const sec_quest = document.getElementById("secQuest").value;
        const responseText = document.getElementById("response").value;
        const userId = localStorage.getItem("userId");

        if (!userId) {
            alert("You must be logged in to add a security question!");
            return;
        }

        try {
            const res = await fetch("http://localhost:3001/addNewSecurityQuestion", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId, sec_quest, response: responseText })
            });

            const data = await res.json();

            if (res.ok) {
            alert("Security Question added successfully!");
            document.getElementById("secQuest").value = "";
            document.getElementById("response").value = "";
            localStorage.setItem("questionsUpdated", "true");
            } else {
            alert("Eroare: " + data.message);
            }

        } catch (err) {
            console.error("Error:", err);
            alert("An error occurred while sending the request!");
        }
        });
    </script>
</body>
</html>
