<script>
    // Variabile globale pentru testul selectat și dificultate
    let selectedTestType = null;       // "main" | "sub" | "final"
    let selectedDifficulty = null;     // "beginner" | "intermediate" | "hard"

    // === Load main objectives ===
    function loadMainObjectives() {
        selectedTestType = "main";
        document.getElementById("main-objectives").style.display = "block";
        document.getElementById("secondary-objectives").style.display = "none";

        fetch("/data/objectives.xml")
            .then(response => {
                if (!response.ok) throw new Error("HTTP error " + response.status);
                return response.text();
            })
            .then(xmlText => {
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, "text/xml");

                const mainObjectives = xmlDoc.querySelectorAll("obiective > obiectiv");
                const container = document.getElementById("main-objectives");
                container.innerHTML = "";

                mainObjectives.forEach(obj => {
                    const id = obj.getAttribute("id");
                    const name = obj.querySelector("name").textContent;

                    const li = document.createElement("li");
                    li.innerHTML = `
                        <label>
                            <input type="checkbox" class="objective-checkbox" value="${id}" data-name="${name}">
                            ${name}
                        </label>
                    `;
                    container.appendChild(li);
                });
            })
            .catch(err => console.error("Eroare la încărcarea XML:", err));
    }

    // === Load secondary objectives ===
    function loadSecondaryObjectives() {
        selectedTestType = "sub";
        document.getElementById("secondary-objectives").style.display = "block";
        document.getElementById("main-objectives").style.display = "none";

        fetch("/data/objectives.xml")
            .then(res => res.text())
            .then(xmlText => {
                const xmlDoc = new DOMParser().parseFromString(xmlText, "text/xml");
                const container = document.getElementById("secondary-objectives");
                container.innerHTML = "";

                const secondaryObjectives = xmlDoc.querySelectorAll("subobiective > obiectiv");
                secondaryObjectives.forEach(obj => {
                    const id = obj.getAttribute("id");
                    const name = obj.querySelector("name").textContent;

                    const li = document.createElement("li");
                    li.innerHTML = `
                        <input type="checkbox" class="objective-checkbox" value="${id}" data-name="${name}">
                        <span>${name}</span>
                    `;
                    container.appendChild(li);
                });
            })
            .catch(err => console.error("Eroare XML:", err));
    }

    // === Show final test panel ===
    function showFinalTest() {
        selectedTestType = "final";
        document.getElementById("main-objectives").style.display = "none";
        document.getElementById("secondary-objectives").style.display = "none";

        document.querySelectorAll(".objective-checkbox").forEach(cb => cb.disabled = true);
        document.querySelector(".difficulty-panel").style.display = "block";
    }

    // === Set difficulty ===
    function setDifficulty(level) {
        selectedDifficulty = level;
        console.log("Dificultate selectată:", selectedDifficulty);

function confirmSelection() {
    let userId = localStorage.getItem("userId");
    localStorage.setItem("userId", "U00033");
    if (!userId) {
        alert("Nu ești autentificat!");
        return;
    }

    if (!selectedTestType) {
        alert("Selectează tipul de test!");
        return;
    }

    if (selectedTestType === "final" && !selectedDifficulty) {
        alert("Selectează dificultatea!");
        return;
    }

    const objectives = [];
    document.querySelectorAll(".objective-checkbox:checked").forEach(cb => {
        objectives.push(parseInt(cb.value));
    });

    if ((selectedTestType === "main" || selectedTestType === "sub") && objectives.length === 0) {
        alert("Selectează cel puțin un obiectiv!");
        return;
    }

    // 🔹 Transformare dificultate pentru backend
    let backendDifficulty;
    if (selectedDifficulty === "easy") backendDifficulty = "beginner";
    if (selectedDifficulty === "medium") backendDifficulty = "intermediate";
    if (selectedDifficulty === "hard") backendDifficulty = "hard";

    const payload = {
        testType: selectedTestType,       
        difficulty: backendDifficulty,   
        userId: userId,
        objectives: objectives
    };

    console.log("Payload trimis:", payload);

    fetch("http://localhost:3001/generate-test", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
        console.log("Test generat:", data);
        // alert("Test generat cu succes! Verifică consola pentru răspuns.");
        
        // 🔹 salvezi testul pentru pagina următoare
        localStorage.setItem("currentTest", JSON.stringify(data));

        // 🔹 redirect către pagina de test
        window.location.href = "/test.html";
    })
    .catch(err => console.error("Eroare la generare test:", err));
}
