      document.getElementById("logoutBtn").addEventListener("click", async () => {
        const userId = localStorage.getItem("userId");

        try {
            const response = await fetch(`http://localhost:3001/api/logout`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userId: userId })
            });

            if (response.ok) {
                localStorage.clear(); 

                alert("You have successfully logged out!");
                
                window.location.href = "login.html";
            } else {
                alert("Error logging out of the server.");
            }
        } catch (error) {
            console.error("Network error:", error);
            localStorage.clear();
            window.location.href = "login.html";
        }
    });

      async function loadLearningCurve(userId) {
        try {
          const response = await fetch(`http://localhost:3001/learning-curve/${userId}`);
          const result = await response.json(); 

          const actualData = result.actual;
          const predictionData = result.predictions;

          const labels = [
            ...actualData.map(item => `Test ${item.attempt}`),
            ...predictionData.map(item => `Predicție ${item.attempt}`)
          ];

          const actualScores = actualData.map(item => item.score);
          
          const objectives = actualData.map(item => item.objective);


          const lastActualScore = actualScores[actualScores.length - 1];
          const predictedScores = [
            ...new Array(actualScores.length - 1).fill(null), // Gol în dreptul testelor vechi
            lastActualScore,                                 // Punct de legătură
            ...predictionData.map(item => item.score)        // Valorile prezise
          ];

          const ctx = document.getElementById('learningCurveChart').getContext('2d');
          
          // Distrugem graficul vechi dacă există (pentru a evita suprapunerea la refresh)
          if (window.myChart) { window.myChart.destroy(); }

          window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
              labels: labels,
              datasets: [
                {
                  label: 'Scor Real (%)',
                  data: actualScores,
                  borderColor: '#5365A8',
                  backgroundColor: 'rgba(83, 101, 168, 0.2)',
                  fill: true,
                  tension: 0.3,
                  pointRadius: 5
                },
                {
                  label: 'Predicție AI (%)',
                  data: predictedScores,
                  borderColor: '#E18741', // Portocaliu pentru distincție
                  borderDash: [5, 5],      // Linie punctată pentru a indica estimarea
                  backgroundColor: 'transparent',
                  fill: false,
                  tension: 0.3,
                  pointRadius: 4
                }
              ]
            },
            options: {
              plugins: {
                tooltip: {
                  callbacks: {
                    afterLabel: function(context) {
                      // Afișăm obiectivele doar pentru punctele reale
                      if (context.datasetIndex === 0 && objectives[context.dataIndex]) {
                        return 'Obiective: ' + objectives[context.dataIndex];
                      }
                      if (context.datasetIndex === 1) {
                        return 'Estimare bazată pe trendul actual';
                      }
                      return null;
                    }
                  }
                }
              },
              scales: {
                y: { 
                  beginAtZero: true, 
                  max: 100,
                  title: { display: true, text: 'Punctaj %' }
                },
                x: {
                  title: { display: true, text: 'Evoluție Teste' }
                }
              }
            }
          });
        } catch (err) {
          console.error("Eroare la încărcarea graficului cu predicții:", err);
        }
      }


        async function getUserProfile() {
          const userId = localStorage.getItem("userId");
          const emails = JSON.parse(localStorage.getItem("emails") || "[]");

          if (!userId) {
            alert("You are not logged in!");
            window.location.href = "../frontend/login.html";
            return;
          }

          try {
            const response = await fetch(`http://localhost:3001/profile/${userId}`);
            const user = await response.json();

            document.getElementById("userId").textContent = user.idUser;
            document.getElementById("firstName").textContent = user.firstName;
            document.getElementById("secondName").textContent = user.secondName;
            document.getElementById("role").textContent = user.role;
            document.getElementById("status").textContent = user.status;

            loadLearningCurve(userId);

            const emailList = document.getElementById("emailList");
            emailList.innerHTML = "";
            if (emails.length === 0) {
              const li = document.createElement("li");
              li.textContent = "There are no emails associated with this account.";
              li.style.color = "#5365A8";
              li.style.fontWeight = "500";
              li.style.listStyleType = "none";
              li.style.margin = "5px 0";
              emailList.appendChild(li);
            } else {
              emails.forEach(email => {
                const li = document.createElement("li");
                li.textContent = email;
                li.style.color = "#5365A8";
                li.style.fontWeight = "500";
                li.style.listStyleType = "none";
                li.style.margin = "5px 0";
                emailList.appendChild(li);
              });
            }
          } catch (err) {
            console.error("Error getting profile:", err);
            alert("Error loading profile!");
          }
        }

        document.getElementById("profileForm").addEventListener("submit", async (e) => {
          e.preventDefault();
          const userId = document.getElementById("userId").value;
          const firstName = document.getElementById("firstName").value;
          const secondName = document.getElementById("secondName").value;

          try {
            await fetch(`http://localhost:3001/profile/${userId}/first-name`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ newName: firstName }),
            });

            await fetch(`http://localhost:3001/profile/${userId}/second-name`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ newName: secondName }),
            });

            alert("Profile updated successfully!");
          } catch (err) {
            console.error("Update error:", err);
            alert("Error updating profile!");
          }
        });

        window.addEventListener("DOMContentLoaded", getUserProfile);
