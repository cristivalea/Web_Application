<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization</title>
    <link rel="stylesheet" href="../frontend/style/style.css">
</head>
<body>
    <div class="header">
        <img src="../frontend/images/itLabs.png" alt="ITLabs Logo" width="279" height="110">
        <img src="../frontend/images/upt.png" alt="University Logo" width="257" height="88">
        <img src="../frontend/images/ac.png" alt="Faculty Logo" width="296" height="90">
    </div>

  <div class="profile-container">
    <h1 class="title">Me Profile</h1>

    <form id="profileForm">
        <div class="profile-group">
          <label>User ID:</label>
          <span id="userId" class="profile-value"></span>
        </div>

        <div class="profile-group">
          <label>Prenume:</label>
          <span id="firstName" class="profile-value"></span>
        </div>

        <div class="profile-group">
          <label>Nume:</label>
          <span id="secondName" class="profile-value"></span>
        </div>

        <div class="profile-group">
          <label>Rol:</label>
          <span id="role" class="profile-value"></span>
        </div>

        <div class="profile-group">
          <label>Status:</label>
          <span id="status" class="profile-value"></span>
        </div>

        <div class="profile-group">
          <label>Emailuri:</label>
          <ul id="emailList"></ul>
        </div>
    </form>
    <button id="addEmailBtn" class="add-email-btn">Adaugă un email nou</button>
    <button id="addNewSecurityQuestion" class="add-secQuest-btn" onclick="window.location.href='../frontend/add_new_security_quest.html'">Add new security questiion</button>
    <button id="deleteSecurityQuestion" class="add-secQuest-btn" onclick="window.location.href='../frontend/delete_security_question.html'">Delete security question</button>
    <button id="modifySecurityQuestion" class="add-secQuest-btn" onclick="window.location.href='../frontend/modify_secQuest_response.html'">Modify security question</button>
    <button id="modifyFirstName" class="add-secQuest-btn" onclick="window.location.href='../frontend/modify_first_name.html'">Modify first name</button>
    <button id="modifySecondName" class="add-secQuest-btn" onclick="window.location.href='../frontend/modify_second_name.html'">Modify second name</button>

  </div>

  <div class="footer">
    <p>&copy; 2025 ITLabs. All rights reserved.</p>
    <a href="../frontend/feedback.html" class="feedback">Feedback</a>
    <a href="../frontend/contact.html" class="contact">Contact Information</a>
  </div>

    <script>
        async function getUserProfile() {
          const userId = localStorage.getItem("userId");
          const emails = JSON.parse(localStorage.getItem("emails") || "[]");

          if (!userId) {
            alert("Nu ești logat!");
            window.location.href = "../frontend/login.html";
            return;
          }

          try {
            const response = await fetch(`http://localhost:3001/profile/${userId}`);
            const user = await response.json();

            document.getElementById("userId").textContent = user.idUser;
            document.getElementById("firstName").textContent = user.firstName;
            document.getElementById("secondName").textContent = user.secondName;
            document.getElementById("role").textContent = user.role;
            document.getElementById("status").textContent = user.status;

            const emailList = document.getElementById("emailList");
            emailList.innerHTML = "";
            if (emails.length === 0) {
              const li = document.createElement("li");
              li.textContent = "Nu există emailuri asociate acestui cont.";
              li.style.color = "#5365A8";
              li.style.fontWeight = "500";
              li.style.listStyleType = "none";
              li.style.margin = "5px 0";
              emailList.appendChild(li);
            } else {
              emails.forEach(email => {
                const li = document.createElement("li");
                li.textContent = email;
                li.style.color = "#5365A8";
                li.style.fontWeight = "500";
                li.style.listStyleType = "none";
                li.style.margin = "5px 0";
                emailList.appendChild(li);
              });
            }
          } catch (err) {
            console.error("Eroare la obținerea profilului:", err);
            alert("Eroare la încărcarea profilului!");
          }
        }

        document.getElementById("profileForm").addEventListener("submit", async (e) => {
          e.preventDefault();
          const userId = document.getElementById("userId").value;
          const firstName = document.getElementById("firstName").value;
          const secondName = document.getElementById("secondName").value;

          try {
            await fetch(`http://localhost:3001/profile/${userId}/first-name`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ newName: firstName }),
            });

            await fetch(`http://localhost:3001/profile/${userId}/second-name`, {
              method: "PUT",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ newName: secondName }),
            });

            alert("Profil actualizat cu succes!");
          } catch (err) {
            console.error("Eroare la actualizare:", err);
            alert("Eroare la actualizarea profilului!");
          }
        });

        window.addEventListener("DOMContentLoaded", getUserProfile);
        document.getElementById("addEmailBtn").addEventListener("click", () => {
          window.location.href = "../frontend/add_new_email_address.html";
        });
    </script>
  </body>
</html>
