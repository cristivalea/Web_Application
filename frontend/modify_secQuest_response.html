<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Security Question Response</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <div class="header">
        <img src="../images/itLabs.png" alt="ITLabs Logo" width="279" height="110">
        <img src="../images/upt.png" alt="University Logo" width="257" height="88">
        <img src="../images/ac.png" alt="Faculty Logo" width="296" height="90">
    </div>

    <div class="secQuest-container">
        <h1 class="title">Update Security Question Response</h1>
        <div id="secQuestList"></div>
    </div>
</div>
    <div class="footer">
        <p>&copy; 2025 ITLabs. All rights reserved.</p>
        <a href="../feedback.html" class="feedback">Feedback</a>
        <a href="../contact.html" class="contact">Contact Information</a>
    </div>

    <script>
        async function loadSecurityQuestions() {
            const userId = localStorage.getItem("userId");
            const listEl = document.getElementById("secQuestList");

            if (!userId) {
                alert("You must be logged in to change your security questions!");
                return;
            }

            try {
                const response = await fetch(`http://localhost:3001/getActiveSecurityQuestions/${userId}`);

        if (!response.ok) {
            const text = await response.text();
            console.error("Backend response:", text);
            throw new Error(`Error loading questions: ${response.status}`);
        }

        const questions = await response.json();
        console.log("Questions received:", questions);

                console.log("Questions received", questions);
                listEl.innerHTML = "";

                if (!questions.length) {
                    const noQuestionsDiv = document.createElement("div");
                    noQuestionsDiv.textContent = "There are no active security questions.";
                    noQuestionsDiv.style.color = "#5365A8";
                    noQuestionsDiv.style.fontStyle = "italic";
                    listEl.appendChild(noQuestionsDiv);
                    return;
                }

                questions.forEach(q => {
                    const container = document.createElement("div");
                    container.classList.add("sec-question-item");
                    container.style.marginBottom = "15px";
                    container.style.border = "1px solid #5365A8";
                    container.style.padding = "10px";
                    container.style.borderRadius = "8px";
                    container.style.backgroundColor = "#8EBFE4";

                    const questionSpan = document.createElement("span");
                    questionSpan.textContent = q.member1;
                    questionSpan.style.color = "#5365A8";
                    questionSpan.style.fontWeight = "500";
                    questionSpan.style.display = "block";
                    questionSpan.style.marginBottom = "5px";

                    const input = document.createElement("input");
                    input.type = "text";
                    input.placeholder = "Răspuns nou";
                    input.style.marginRight = "10px";

                    
                    const updateBtn = document.createElement("button");
                    updateBtn.textContent = "Update";
                    updateBtn.classList.add("add-secQuest-btn");
                    updateBtn.style.border = "#5365A8";
                    updateBtn.onclick = async () => {
                        const newResponse = input.value.trim();
                        if (!newResponse) {
                            alert("Enter a new answer!");
                            return;
                        }
                        try {
                            const res = await fetch(
                                `http://localhost:3001/updateSecurityQuestionResponse?userId=${userId}&question=${encodeURIComponent(q.member1)}&newResponse=${encodeURIComponent(newResponse)}`,
                                { method: "PUT" }
                            );
                            const data = await res.json();
                            alert(data.message);
                            await loadSecurityQuestions(); 
                        } catch (err) {
                            console.error("Error updating response:", err);
                            alert("Error updating answer!");
                        }
                    };

                    container.appendChild(questionSpan);
                    container.appendChild(input);
                    container.appendChild(updateBtn);

                    listEl.appendChild(container);
                });
            } catch (err) {
                console.error("Error loading questions:", err);
                listEl.innerHTML = "<div>Error loading questions!</div>";
            }
        }

        window.addEventListener("DOMContentLoaded", loadSecurityQuestions);
    </script>
</body>
</html>
