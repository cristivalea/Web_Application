<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../frontend/style/style.css">
</head>
<body>
    <!-- Header -->
   <div class="header">
        <img src="../frontend/images/itLabs.png" alt="ITLabs Logo" width="279" height="110">
        <img src="../frontend/images/upt.png" alt="University Logo" width="257" height="88">
        <img src="../frontend/images/ac.png" alt="Faculty Logo" width="296" height="90">
    </div>


    <div class="login-container">
        <h1 class="title">Login</h1>
        <form id="loginForm">

            <div class="login-form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>

            <div class="reset-password">
                <a href="#">Resetare parola</a>
            </div>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <label for="terms">Am citit termenii si conditiile</label>
            </div>

            <div class="button-group">
                <button type="submit" class="login-btn">Login</button>
            </div>

            <div class="register-section">
                <span>Nu ai cont?</span>
                <button type="button" class="register-btn">Register</button>
            </div>
        </form>
    </div>

    <div class="footer">
        <p>&copy; 2025 ITLabs. All rights reserved.</p>
    </div>

    <script>
  const form = document.getElementById("loginForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
      const response = await fetch("http://localhost:3001/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await response.json();
      alert(data.message); 
    } catch (err) {
      console.error("Eroare la login:", err);
      alert("A apărut o eroare la login.");
    }
  });
</script>

</body>
</html>
