            <div class="login-form-group">

            <div class="form-group">

            <div class="reset-password">
                <a href="../reset_password.html">Reset Password</a>

            <div class="terms">
                <input type="checkbox" id="terms" required>
                <!-- <label for="terms">I have read the terms and conditions.</label> -->

            </div>

            <div class="button-group">
                <button type="submit" class="login-btn">Login</button>
            </div>

            <div class="register-section">
                <span>Nu ai cont?</span>
                <a href="../registration.html" class="register-btn">Register</a>
            </div>
        </form>
    </div>

   <div class="footer">
        <p>&copy; 2025 ITLabs. All rights reserved.</p>
        <a href="../feedback.html" class="feedback">Feedback</a>
        <a href="../contact.html" class="contact">Contact Information</a>
    </div>

<script>
  const form = document.getElementById("loginForm");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const username = document.getElementById("username").value;
    const password = document.getElementById("password").value;

    try {
      const response = await fetch("http://localhost:3001/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      if (!response.ok) {
        throw new Error("Eroare la autentificare");
      }

     const data = await response.json();
    console.log("Răspuns backend login:", data);

      if (data.userId && data.token) {

         localStorage.setItem("userId", data.userId);
        localStorage.setItem("emails", JSON.stringify(data.emails)); 
        sessionStorage.setItem("serverToken", data.token);

        alert("Authentication successful! Enter the token for verification.");
        window.location.href = "../authorization.html";
      } else {
        alert("The authentication data is not valid.");
      }

    } catch (err) {
      console.error("Login error:", err);
      alert("An error occurred during login.");
    }
  });
</script>


</body>
</html>
