<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modify Second Name</title>
    <link rel="stylesheet" href="../style/style.css">
</head>
<body>
    <div class="header">
        <img src="../images/itLabs.png" alt="ITLabs Logo" width="279" height="110">
        <img src="../images/upt.png" alt="University Logo" width="257" height="88">
        <img src="../images/ac.png" alt="Faculty Logo" width="296" height="90">
    </div>

    <div class="firstName-container">
        <h1 class="title">Update Second Name</h1>

        <form id="secondNameForm">
        <div class="first-group">
            <label for="secondNameInput">New Second Name:</label>
            <input type="text" id="secondNameInput" name="secondName" required>
        </div>
        <button type="submit" class="submit-btn">Update Second Name</button>
        </form>
    </div>

    <div class="footer">
        <p>&copy; 2025 ITLabs. All rights reserved.</p>
        <a href="../feedback.html" class="feedback">Feedback</a>
        <a href="../contact.html" class="contact">Contact Information</a>
    </div>

    <script>
        document.getElementById("secondNameForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const newSecondName = document.getElementById("secondNameInput").value;
        const userId = localStorage.getItem("userId");
        console.log("userId from localStorage:", localStorage.getItem("userId"));
        console.log("newSecondName:", newSecondName);


        if (!userId) {
            alert("You must be logged in to change your first name!");
            return;
        }

        try {
            const response = await fetch("http://localhost:3001/updateSecondName", {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId, newSecondName })
            });

            const data = await response.json();

            if (response.ok) {
            alert("First name updated successfully!");
            document.getElementById("secondNameInput").value = "";
            } else {
            alert("Eroare: " + data.message);
            }
        } catch (error) {
            console.error("Error updating first name:", error);
            alert("An error occurred. Please try again later.");
        }
        });
    </script>
</body>
</html>
