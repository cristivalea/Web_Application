<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Email</title>
    <link rel="stylesheet" href="../frontend/style/style.css">
</head>
<body>
    <div class="header">
        <img src="../frontend/images/itLabs.png" alt="ITLabs Logo" width="279" height="110">
        <img src="../frontend/images/upt.png" alt="University Logo" width="257" height="88">
        <img src="../frontend/images/ac.png" alt="Faculty Logo" width="296" height="90">
    </div>

    <div class="add-email-container">
        <h1 class="title">Add new email address</h1>

        <form id="addEmailForm">
            <div class="auth-form-group">
                <label for="newEmail">Adresă de email nouă:</label>
                <input type="email" id="newEmail" name="newEmail" required>
            </div>

            <button type="submit" class="auth-btn">Adaugă email</button>
        </form>
    </div>

    <div class="footer">
        <p>&copy; 2025 ITLabs. All rights reserved.</p>
        <a href="../frontend/feedback.html" class="feedback">Feedback</a>
        <a href="../frontend/contact.html" class="contact">Contact Information</a>
    </div>

    <script>
        document.getElementById("addEmailForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const newEmail = document.getElementById("newEmail").value;
        const userId = localStorage.getItem("userId");

        if (!userId) {
            alert("Trebuie să fii autentificat pentru a adăuga un email!");
            return;
        }

        try {
            const response = await fetch("http://localhost:3001/addEmail", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ userId, newEmail })
            });

            const data = await response.json();

            if (response.ok) {
            alert("Email adăugat cu succes!");
            document.getElementById("newEmail").value = "";
            } else {
            alert("Eroare: " + data.message);
            }

        } catch (err) {
            console.error("Error:", err);
            alert("A apărut o eroare la trimiterea cererii!");
        }
        });
    </script>

</body>
</html>
