// 1. Inițializăm lista globală de răspunsuri
let allUserAnswers = [];
const testData = JSON.parse(localStorage.getItem("currentTest"));
let currentQuestionIndex = 0;
const questions = testData.quesyions || testData.questions;
let markedQuestions = []; // Lista cu indecșii întrebărilor marcate
let currentReviewIndex = -1; // Urmărește unde suntem în lista de review

function saveCurrentAnswer() {
    const container = document.getElementById("question-container");
    
    // 1. Luăm întrebarea brută (cea care conține string-ul .question)
    const rawQuestionData = questions[currentQuestionIndex]; 
    
    // 2. Parsăm conținutul (obiectul pe care l-ai trimis în log-ul anterior)
    let questionObj;
    try {
        questionObj = JSON.parse(rawQuestionData.question);
    } catch (e) {
        console.error("Eroare la parsarea JSON-ului întrebării");
        return;
    }

    // 3. Colectăm răspunsurile bifate
    const selectedInputs = container.querySelectorAll('input:checked');
    if (selectedInputs.length === 0) {
        alert("Te rugăm să selectezi cel puțin un răspuns înainte de Submit!");
        return;
    }

    const selectedTexts = Array.from(selectedInputs).map(input => {
        // Căutăm textul în label sau părinte
        const label = container.querySelector(`label[for="${input.id}"]`);
        return label ? label.innerText.trim() : input.parentElement.innerText.trim();
    });

    // 4. CONSTRUCȚIA JSON-ULUI - Folosim proprietățile reale descoperite
    const answerEntry = {
        "idUser": localStorage.getItem("userId"),
        "idTest": testData.test.idTest, 
        // Aici folosim 'id' din interiorul obiectului de întrebare parsat
        "idQuestion": questionObj.id, 
        "selectedAnswers": selectedTexts
    };

    // 5. Salvare în listă (Update sau Push)
    const existingIndex = allUserAnswers.findIndex(item => item.idQuestion === answerEntry.idQuestion);
    
    if (existingIndex !== -1) {
        allUserAnswers[existingIndex] = answerEntry;
    } else {
        allUserAnswers.push(answerEntry);
    }

    // Afișăm în consolă pentru confirmare
    console.log("JSON Generat:", JSON.stringify(answerEntry, null, 2));
    console.log("Lista completă de răspunsuri:", allUserAnswers);
    
    // alert(`Răspuns salvat pentru: ${answerEntry.idQuestion}`);
}

async function finishTest() {
    // 1. Verificare dacă există răspunsuri
    if (allUserAnswers.length === 0) {
        if (!confirm("Nu ai salvat niciun răspuns prin butonul Submit. Sigur vrei să închei testul?")) {
            return;
        }
    }

    // 2. Calculare date pentru JSON-ul de durată (test_duration)
    const initialDuration = testData.test.estimatedDuration; 
    const timeTaken = initialDuration - timeLeft;

    const now = new Date();
    const formattedFinishTime = now.getFullYear() + "-" + 
        String(now.getMonth() + 1).padStart(2, '0') + "-" + 
        String(now.getDate()).padStart(2, '0') + " " + 
        String(now.getHours()).padStart(2, '0') + ":" + 
        String(now.getMinutes()).padStart(2, '0') + ":" + 
        String(now.getSeconds()).padStart(2, '0');

    const durationData = {
        "difficulty": testData.test.difficulty || "INTERMEDIATE", 
        "finishTime": formattedFinishTime,
        "timeTakenSeconds": timeTaken,
        "idTest": testData.test.idTest,
        "idUser": localStorage.getItem("userId") || "U00035"
    };

    try {
        console.log("Se trimit datele către backend...");

        // 3. Trimitem ambele cereri către Node.js
        // Prima cerere: Salvarea răspunsurilor și obținerea rezultatului
        const responseSubmit = await fetch("http://localhost:3001/submit-test", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                idUser: localStorage.getItem("userId") || "U00033",
                idTest: testData.test.idTest,
                responses: allUserAnswers
            })
        });

        // A doua cerere: Trimiterea datelor de durată către Node.js (care va face proxy către portul 8080)
        // Notă: Aici folosim portul 3001 deoarece ai specificat că Node-ul le va transmite mai departe
        const responseDuration = await fetch("http://localhost:3001/save-duration", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(durationData)
        });

        if (responseSubmit.ok) {
            const result = await responseSubmit.json();
            
            // Salvare rezultat pentru pagina de rezultate
            localStorage.setItem("lastTestResult", JSON.stringify(result));

            if (!responseDuration.ok) {
                console.warn("Atenție: Răspunsurile au fost salvate, dar durata nu a putut fi procesată de backend.");
            }

            alert("Testul a fost finalizat cu succes!");
            window.location.href = "results.html";
        } else {
            const errorData = await responseSubmit.json();
            console.error("Eroare server (răspunsuri):", errorData);
            throw new Error("Eroare la trimiterea testului.");
        }

    } catch (error) {
        console.error("Eroare fetch:", error);
        alert("A apărut o problemă la comunicarea cu serverul.");
    }
}

// Funcția pentru a marca/demarca întrebarea curentă
function toggleMark() {
    const index = currentQuestionIndex;
    const pos = markedQuestions.indexOf(index);

    if (pos === -1) {
        markedQuestions.push(index);
        markedQuestions.sort((a, b) => a - b); // Menținem ordinea întrebărilor
        alert(`Întrebarea ${index + 1} a fost marcată.`);
    } else {
        markedQuestions.splice(pos, 1);
        alert(`Întrebarea ${index + 1} a fost scoasă din lista de review.`);
    }
    console.log("Întrebări marcate:", markedQuestions);
}

// Funcția pentru navigarea prin întrebările marcate
function reviewMarkedQuestions() {
    if (markedQuestions.length === 0) {
        alert("Nu ai nicio întrebare marcată pentru review.");
        return;
    }

    // Trecem la următoarea întrebare marcată
    currentReviewIndex++;

    // Dacă am ajuns la finalul listei de marcaje, revenim la prima
    if (currentReviewIndex >= markedQuestions.length) {
        currentReviewIndex = 0;
        alert("Ai parcurs toate întrebările marcate. Revenim la prima.");
    }

    const nextMarkedIndex = markedQuestions[currentReviewIndex];
    currentQuestionIndex = nextMarkedIndex;
    loadQuestion(currentQuestionIndex);
}

let timeLeft = testData.test.estimatedDuration; // Durata venită din API în secunde
let timerInterval;

function startTimer() {
    const display = document.getElementById("timer-display");

    timerInterval = setInterval(() => {
        // Calculăm minutele și secundele
        let minutes = Math.floor(timeLeft / 60);
        let seconds = timeLeft % 60;

        // Formatăm să arate mereu 2 cifre (ex: 05:09)
        minutes = minutes < 10 ? "0" + minutes : minutes;
        seconds = seconds < 10 ? "0" + seconds : seconds;

        display.innerText = `Time: ${minutes}:${seconds}`;

        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            alert("Timpul a expirat! Testul va fi trimis automat.");
            finishTest(); // Trimitem testul automat când expiră timpul
        }

        timeLeft--; // Scădem o secundă
    }, 1000);
}

document.addEventListener("DOMContentLoaded", () => {
    const nextBtn = document.getElementById("nextBtn");
    const prevBtn = document.getElementById("prevBtn");
    const submitBtn = document.getElementById("submitBtn");
    const doneBtn = document.getElementById("doneBtn");
    const markBtn = document.getElementById("markBtn"); // Buton nou
    const reviewBtn = document.getElementById("reviewBtn"); // Buton nou

    if (questions && questions.length > 0) {
        loadQuestion(currentQuestionIndex);
        startTimer(); // Pornim cronometrul aici
    }

    if (nextBtn) nextBtn.addEventListener("click", nextQuestion);
    if (prevBtn) prevBtn.addEventListener("click", prevQuestion);
    
    // Butonul Submit salvează răspunsul curent
    if (submitBtn) {
        submitBtn.addEventListener("click", saveCurrentAnswer);
    }

    if (doneBtn) {
        doneBtn.addEventListener("click", finishTest);
    }

    if (markBtn) markBtn.addEventListener("click", toggleMark);
    if (reviewBtn) reviewBtn.addEventListener("click", reviewMarkedQuestions);

    if (questions && questions.length > 0) {
        loadQuestion(currentQuestionIndex);
    }
});

    const markBtn = document.getElementById("markBtn");
    if (markedQuestions.includes(index)) {
        markBtn.style.backgroundColor = "yellow";
        markBtn.innerText = "Unmark Question";
    } else {
        markBtn.style.backgroundColor = "";
        markBtn.innerText = "Mark this Question for Review!";
    }
}

function restoreUserAnswer(questionId) {
    // Căutăm dacă avem deja un răspuns salvat pentru acest ID de întrebare
    const savedEntry = allUserAnswers.find(item => item.idQuestion === questionId);
    
    if (savedEntry && savedEntry.selectedAnswers.length > 0) {
        const container = document.getElementById("question-container");
        const inputs = container.querySelectorAll('input');

        inputs.forEach(input => {
            // Căutăm textul label-ului asociat input-ului
            const label = container.querySelector(`label[for="${input.id}"]`);
            const labelText = label ? label.innerText.trim() : input.parentElement.innerText.trim();

            // Dacă textul se află în lista de răspunsuri salvate, bifăm input-ul
            if (savedEntry.selectedAnswers.includes(labelText)) {
                input.checked = true;
            }
        });
        console.log(`Restaurat răspuns pentru întrebarea: ${questionId}`);
    }
}

function nextQuestion() {
    if (currentQuestionIndex < questions.length - 1) {
        currentQuestionIndex++;
        loadQuestion(currentQuestionIndex);
    } else {
        alert("Aceasta este ultima întrebare.");
    }
}

function prevQuestion() {
    autoSaveSelection();
    if (currentQuestionIndex > 0) {
        currentQuestionIndex--;
        loadQuestion(currentQuestionIndex);
    }
}

function autoSaveSelection() {
    const container = document.getElementById("question-container");
    const selectedInputs = container.querySelectorAll('input:checked');
    
    // Dacă nu e nimic bifat, nu salvăm nimic (sau lăsăm vechiul răspuns)
    if (selectedInputs.length === 0) return;

    // Reutilizăm logica de parsare din saveCurrentAnswer, dar fără alert-uri
    const rawQuestionData = questions[currentQuestionIndex]; 
    let questionObj = JSON.parse(rawQuestionData.question);

    const selectedTexts = Array.from(selectedInputs).map(input => {
        const label = container.querySelector(`label[for="${input.id}"]`);
        return label ? label.innerText.trim() : input.parentElement.innerText.trim();
    });

    const answerEntry = {
        "idUser": localStorage.getItem("userId"),
        "idTest": testData.test.idTest, 
        "idQuestion": questionObj.id, 
        "selectedAnswers": selectedTexts
    };

    const existingIndex = allUserAnswers.findIndex(item => item.idQuestion === answerEntry.idQuestion);
    if (existingIndex !== -1) {
        allUserAnswers[existingIndex] = answerEntry;
    } else {
        allUserAnswers.push(answerEntry);
    }
}

// Funcție extra pentru a actualiza bara de progres de jos
function updateProgressBar(index, total) {
    const progress = document.querySelector("progress");
    const progressText = document.querySelector(".progress div:last-child");
    
    if (progress) progress.value = ((index + 1) / total) * 100;
    if (progressText) progressText.innerText = `Question ${index + 1} from ${total}`;
}
