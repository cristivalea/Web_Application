window.renderQuestion = function(question, index, total) {

    /* ===== HEADER ===== */
    document.querySelector(".question-number").textContent =
        `Question ${index + 1}`;

    document.querySelector(".question-id").textContent =
        question.id;

    /* ===== TEXT SUS ===== */
    document.getElementById("textUp").textContent =
        question.Content.textUP;

    /* ===== IMAGINE ===== */
    // const imgEl = document.getElementById("questionImage");
    // if (question.Content.img) {
    //     imgEl.src = question.Content.img;
    //     imgEl.style.display = "block";
    // } else {
    //     imgEl.style.display = "none";
    // }

        /* ===== IMAGE ===== */
   const img = document.getElementById("questionImage");
    
    // URL-ul este acum către backend-ul tău Node (port 3001)
    // Node se va ocupa de restul!
    const proxyUrl = `http://localhost:3001/api/proxy-image/${question.id}`;

    if (img) {
        img.src = proxyUrl;
        img.style.display = "block";
        
        // Dacă imaginea nu există, o ascundem automat
        img.onerror = function() {
            this.style.display = "none";
        };
    }

    /* ===== RĂSPUNSURI ===== */
    const answersForm = document.getElementById("answersForm");
    answersForm.innerHTML = "";

    question.responses.forEach((resp, i) => {
        answersForm.innerHTML += `
            <div class="answer">
                <label>
                    <input type="checkbox" data-index="${i}">
                    ${resp.respoonse}
                </label>
            </div>
        `;
    });

    /* ===== PROGRESS ===== */
    const progress = document.querySelector("progress");
    progress.value = Math.round(((index + 1) / total) * 100);
};
