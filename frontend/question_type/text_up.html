<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TextUp Image TextDown Responses</title>
    <link rel="stylesheet" href="../style/style.css">
</head>

<body>

<!-- ===== HEADER CU LOGO-URI ===== -->
<div class="header">
    <img src="../images/itLabs.png" alt="ITLabs Logo" width="279" height="110">
    <img src="../images/upt.png" alt="University Logo" width="257" height="88">
    <img src="../images/ac.png" alt="Faculty Logo" width="296" height="90">
</div>

<!-- ===== APLICAȚIE TEST ===== -->
<div class="app">

    <!-- TOOLBAR -->
    <header class="toolbar">
        <button>Submit</button>
        <button>Previous Question</button>
        <button>Next</button>
        <button>Review questions!</button>
        <button class="danger">Done the test</button>
        <button class="mark">Mark this Question for Review!</button>
    </header>

    <!-- HEADER ÎNTREBARE -->
    <section class="question-header">
        <span class="question-number">Question#4</span>
        <span class="question-id">
            SERIAL_NUMBER @ManipulateDataUsingStringBuilder102
        </span>
        <h2 id="textUp"></h2>
    </section>


    <!-- RĂSPUNSURI -->
    <section class="answers" id="answersForm"></section>

    <!-- FOOTER PROGRES -->
    <footer class="progress">
        <div>Test Progress</div>
        <progress value="0" max="100"></progress>
        <div>Question 4 from 20</div>
    </footer>

</div>

<!-- ===== FOOTER GENERAL ===== -->
<div class="footer">
    <p>&copy; 2025 ITLabs. All rights reserved.</p>
    <a href="/feedback.html" class="feedback">Feedback</a>
    <a href="/contact.html" class="contact">Contact Information</a>
</div>

<!-- ===== SCRIPT ===== -->
<script>
/* ===== JSON EXACT ===== */
const question = {
   "format" : "TEXT_UP",
               "type" : "MIDLELEVELQUESTION",
               "id" : "ManipulateDataUsingStringBuilder102",
               "mainObjectives" : [ {
                 "id" : "9",
                 "name" : "Working with Selected classes from the Java API"
               } ],
               "secondaryObjectives" : [ {
                 "id" : "92",
                 "name" : "Manipulate data using the StringBuilder class and its methods"
               } ],
               "estimateSeconds" : 100,
               "Content" : {
                 "text": {
                            "textUP": "What is the output if this class is run with java Indexing cars carts?"
                          }

               },
               "responses" : [ {
                 "respoonse" : "cars"
               }, {
                 "respoonse" : "cars carts"
               }, {
                 "respoonse" : "ccars arts"
               }, {
                 "respoonse" : "The code does not compile."
               }, {
                 "respoonse" : "The code compiles but throws an exception at runtime."
               } ],
               "answers" : [ {
                 "answer" : false
               }, {
                 "answer" : false
               }, {
                 "answer" : false
               }, {
                 "answer" : false
               }, {
                 "answer" : true
               } ],
               "hint" : "Use invalid index"
             };

/* ===== RANDĂRE ÎNTREBARE ===== */
document.getElementById("textUp").textContent =
    question.Content.text.textUP;


/* ===== RANDĂRE RĂSPUNSURI ===== */
const answersForm = document.getElementById("answersForm");

question.responses.forEach((resp, index) => {
    const div = document.createElement("div");
    div.className = "answer";

    div.innerHTML = `
        <label>
            <input type="checkbox" value="${index}">
            ${resp.respoonse}
        </label>
    `;

    answersForm.appendChild(div);
});
</script>

</body>
</html>
